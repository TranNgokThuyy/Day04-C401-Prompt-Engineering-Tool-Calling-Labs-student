# starter_v0 — tool declarations (intentionally vague).
# Names and descriptions here are a rough first draft. Routing rules, name->handle
# mapping, arg conventions (news/timeframe/Top), and the send-confirmation boundary
# are NOT spelled out anywhere yet. Your job is to make these declarations + the
# system prompt good enough that the agent routes correctly on the eval.
#
# If you rename a tool, keep the name in sync across:
#   this file  ->  tools/__init__.py (TOOL_FUNCTIONS)  ->  data/eval_base.json + data/eval_research_extension.json
tools:
  # ---------------- Core tools ----------------
  - name: clarify
    description: "Gửi một câu hỏi cho người dùng."
    parameters:
      type: object
      properties:
        question: {type: string, default: "", description: "Câu hỏi"}
        response_type: {type: string, enum: [text, yes_no, choice], default: "text", description: "Kiểu trả lời"}
        options: {type: array, default: [], items: {type: string}, description: "Các lựa chọn"}
      required: [question]

  - name: timeline
    description: "Lấy các bài đăng gần đây."
    parameters:
      type: object
      properties:
        screenname: {type: string, default: "", description: "Tên tài khoản"}
        limit: {type: integer, default: 5, description: "Số lượng"}
      required: [screenname]

  - name: social_search
    description: "Tìm trên mạng xã hội."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Từ khóa"}
        search_type: {type: string, enum: [Latest, Top], default: "Latest", description: "Cách sắp xếp"}
        limit: {type: integer, default: 5, description: "Số lượng"}
      required: [query]

  - name: lookup
    description: "Tra cứu thông tin trên internet."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Truy vấn"}
        topic: {type: string, enum: [general, news], default: "general", description: "Phân loại"}
        timeframe: {type: string, enum: [day, week, month, year], default: "week", description: "Khoảng thời gian"}
        max_results: {type: integer, default: 5, description: "Số kết quả"}
      required: [query]

  - name: fetch
    description: "Lấy nội dung từ một địa chỉ."
    parameters:
      type: object
      properties:
        url: {type: string, default: "", description: "Địa chỉ"}
      required: [url]

  - name: format
    description: "Trình bày dữ liệu đã có thành văn bản."
    parameters:
      type: object
      properties:
        items:
          type: array
          default: []
          description: "Danh sách item"
          items:
            type: object
            properties:
              title: {type: string}
              url: {type: string}
              source: {type: string}
              summary: {type: string}
              section: {type: string}
        template: {type: string, enum: [brief, sections, bullets, thread, daily_ai_vn], default: "sections", description: "Khuôn"}
        headline: {type: string, default: "", description: "Tiêu đề"}
      required: [items, template]

  # ---------------- Bonus tools ----------------
  - name: send
    description: "Gửi một đoạn văn bản đi."
    parameters:
      type: object
      properties:
        text: {type: string, default: "", description: "Nội dung"}
        confirmed: {type: boolean, default: false, description: "Cờ xác nhận"}
      required: [text]

  - name: policy
    description: "Tìm trong tài liệu nội bộ."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Truy vấn"}
        policy_area: {type: string, enum: [all, ai_research, source_citation, data_privacy, external_publishing, tool_usage], default: "all", description: "Nhóm"}
        top_k: {type: integer, default: 3, description: "Số mục"}
      required: [query]

  - name: papers
    description: "Tìm bài báo khoa học."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Từ khóa"}
        max_results: {type: integer, default: 5, description: "Số lượng"}
        sort_by: {type: string, enum: [relevance, lastUpdatedDate, submittedDate], default: "relevance", description: "Sắp xếp"}
      required: [query]

  - name: paper_text
    description: "Lấy nội dung text của một bài báo."
    parameters:
      type: object
      properties:
        arxiv_url: {type: string, default: "", description: "ID hoặc địa chỉ"}
        max_pages: {type: integer, default: 5, description: "Số trang"}
        max_chars: {type: integer, default: 8000, description: "Số ký tự"}
      required: [arxiv_url]

  - name: summarize
    description: "Tóm tắt văn bản dài thành các điểm chính ngắn gọn."
    parameters:
      type: object
      properties:
        text: {type: string, default: "", description: "Văn bản cần tóm tắt"}
        max_sentences: {type: integer, default: 3, description: "Số câu tóm tắt tối đa"}
      required: [text]

  - name: keywords
    description: "Trích xuất các từ khóa chính từ nội dung văn bản."
    parameters:
      type: object
      properties:
        text: {type: string, default: "", description: "Văn bản để trích xuất từ khóa"}
        max_keywords: {type: integer, default: 8, description: "Số từ khóa tối đa"}
      required: [text]

  - name: url_preview
    description: "Lấy tiêu đề và mô tả ngắn từ một đường dẫn web."
    parameters:
      type: object
      properties:
        url: {type: string, default: "", description: "URL cần xem trước"}
      required: [url]

  - name: sentiment
    description: "Đánh giá xu hướng tích cực/trung tính/tiêu cực của văn bản."
    parameters:
      type: object
      properties:
        text: {type: string, default: "", description: "Văn bản cần phân tích"}
      required: [text]

  - name: source_inspect
    description: "Khám phá siêu dữ liệu và tình trạng một trang web."
    parameters:
      type: object
      properties:
        url: {type: string, default: "", description: "URL cần kiểm tra"}
      required: [url]

  - name: trend_analysis
    description: "Tìm chủ đề nổi bật và xu hướng từ một tập văn bản."
    parameters:
      type: object
      properties:
        texts: {type: array, default: [], items: {type: string}, description: "Danh sách đoạn văn để phân tích"}
        focus_topic: {type: string, default: "", description: "Chủ đề cần ưu tiên"}
        top_k: {type: integer, default: 5, description: "Số chủ đề hàng đầu"}
      required: [texts]
